services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: flashslots
      POSTGRES_PASSWORD: flashslots
      POSTGRES_DB: flashslots
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_INITDB_ARGS: "--auth-host=trust --auth-local=trust"
    ports:
      - "12345:5432"
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d